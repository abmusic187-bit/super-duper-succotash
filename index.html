<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malikanimaker Video Pro</title>
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .fixed-header { position: sticky; top: 0; z-index: 50; background: #1e293b; }
        .video-card { transition: transform 0.2s; }
        .video-card:hover { transform: scale(1.02); }
    </style>
</head>
<body>

    <!-- Fixed Header -->
    <header class="fixed-header p-4 shadow-lg border-b border-gray-700">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-500">PRODOGE STREAM</h1>
            <div class="flex gap-4">
                <input id="redeemInput" type="text" placeholder="Enter Redeem Code" class="bg-gray-800 border border-gray-600 px-3 py-1 rounded text-sm focus:outline-none focus:border-blue-500">
                <button onclick="handleRedeem()" class="bg-blue-600 hover:bg-blue-700 px-4 py-1 rounded text-sm font-semibold transition">Redeem</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <!-- Status Message -->
        <div id="statusMsg" class="hidden mb-6 p-3 rounded text-center font-medium"></div>

        <!-- Video Grid -->
        <div id="videoGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Videos load here -->
            <div class="text-gray-500 animate-pulse">Loading videos...</div>
        </div>
    </main>

    <script>
        // Your Supabase Credentials
        const SB_URL = "https://txufnyntlphyloyjddox.supabase.co";
        const SB_KEY = "sb_publishable_B8EAiTgMjvbFg1fJOTCpuA_X7E8NRVF";
        
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        // 1. Fetch and Display Videos
        async function fetchVideos() {
            const grid = document.getElementById('videoGrid');
            const { data, error } = await supabase
                .from('videos')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                grid.innerHTML = `<p class="text-red-400">Error loading videos: ${error.message}</p>`;
                return;
            }

            if (data.length === 0) {
                grid.innerHTML = `<p class="text-gray-400">No videos found. Upload one in Supabase!</p>`;
                return;
            }

            grid.innerHTML = data.map(v => `
                <div class="video-card bg-gray-800 rounded-xl overflow-hidden border border-gray-700 shadow-2xl">
                    <video controls class="w-full aspect-video bg-black">
                        <source src="${v.url}" type="video/mp4">
                    </video>
                    <div class="p-4">
                        <h3 class="font-bold text-lg text-gray-100">${v.title}</h3>
                        <p class="text-xs text-gray-500 mt-1 uppercase tracking-wider">Public Access</p>
                    </div>
                </div>
            `).join('');
        }

        // 2. Redeem Code Logic
        async function handleRedeem() {
            const input = document.getElementById('redeemInput');
            const msg = document.getElementById('statusMsg');
            const code = input.value.trim();

            if (!code) return;

            // Simple Logic: Check against a 'redeem_codes' table in Supabase
            const { data, error } = await supabase
                .from('redeem_codes')
                .select('*')
                .eq('code', code)
                .eq('is_used', false)
                .single();

            msg.classList.remove('hidden');
            
            if (data) {
                msg.textContent = "Success! Premium Access Granted.";
                msg.className = "mb-6 p-3 rounded text-center font-medium bg-green-900 text-green-200";
                input.value = "";
                // Here you can trigger logic to show premium videos
            } else {
                msg.textContent = "Invalid or expired code.";
                msg.className = "mb-6 p-3 rounded text-center font-medium bg-red-900 text-red-200";
            }
        }

        // Initial Load
        fetchVideos();
    </script>
</body>
</html>

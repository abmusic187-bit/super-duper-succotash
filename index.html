<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malikanimaker Video Pro</title>
    
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- High-Class Video Player (Plyr) -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        :root { --plyr-color-main: #3b82f6; } /* Custom blue theme */
        .video-card:hover { transform: translateY(-5px); transition: 0.3s; }
    </style>
</head>
<body class="bg-black text-gray-100 min-h-screen">

    <!-- Header -->
    <nav class="border-b border-gray-800 p-6 bg-gray-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tighter text-blue-500">PRODOGE <span class="text-white">STREAM</span></h1>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto p-6">
        <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Loading State -->
            <div id="loading" class="text-gray-500 italic">Loading your library...</div>
        </div>
    </main>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        // Your Specific Credentials
        const SB_URL = "https://txufnyntlphyloyjddox.supabase.co";
        const SB_KEY = "sb_publishable_B8EAiTgMjvbFg1fJOTCpuA_X7E8NRVF";
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        async function fetchVideos() {
            const { data, error } = await supabase
                .from('videos')
                .select('*')
                .order('created_at', { ascending: false });

            const grid = document.getElementById('video-grid');
            const loading = document.getElementById('loading');

            if (error) {
                grid.innerHTML = `<p class="text-red-500">Error: ${error.message}</p>`;
                return;
            }

            loading.style.display = 'none';

            if (data.length === 0) {
                grid.innerHTML = `<p class="text-gray-500 text-center col-span-full">No videos found. Upload one in Supabase!</p>`;
                return;
            }

            data.forEach(video => {
                const card = document.createElement('div');
                card.className = "video-card bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden shadow-2xl";
                card.innerHTML = `
                    <div class="aspect-video bg-gray-800">
                        <video class="player" playsinline controls>
                            <source src="${video.url}" type="video/mp4" />
                        </video>
                    </div>
                    <div class="p-5">
                        <h2 class="text-lg font-medium text-white truncate">${video.title}</h2>
                        <p class="text-sm text-gray-500 mt-1">Ready to play</p>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Initialize the high-class player for all videos
            const players = Plyr.setup('.player', {
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                tooltips: { controls: true }
            });
        }

        fetchVideos();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dolly Hazell Viral - Smooth Stream</title>
    
    <!-- Monetag MultiTag -->
    <script src="https://quge5.com/88/tag.min.js" data-zone="238405" async data-cfasync="false"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        :root { --plyr-color-main: #e11d48; --bg-black: #050505; --card-bg: #121212; }
        body { background-color: var(--bg-black); color: #ffffff; font-family: 'Inter', sans-serif; }
        .nav-blur { background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .video-card { background: var(--card-bg); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); }
        /* Ensures the ad area doesn't layout shift */
        .ad-container { min-height: 50px; background: rgba(255,255,255,0.02); margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <nav class="nav-blur sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black uppercase">Dolly Hazell <span class="text-rose-500">Viral</span></h1>
            <span class="text-[10px] border border-rose-500/50 px-2 py-1 rounded text-rose-500">LOW DATA MODE</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="video-feed" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div id="status" class="col-span-full text-center py-20">
                <div class="inline-block w-8 h-8 border-2 border-rose-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
        </div>
    </main>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const SB_URL = "https://txufnyntlphyloyjddox.supabase.co";
        const SB_KEY = "sb_publishable_B8EAiTgMjvbFg1fJOTCpuA_X7E8NRVF";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function initApp() {
            const feed = document.getElementById('video-feed');
            const status = document.getElementById('status');
            try {
                const { data: videos, error } = await _supabase.from('videos').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                status.style.display = 'none';

                videos.forEach(video => {
                    const card = document.createElement('div');
                    card.className = "video-card shadow-2xl p-2";
                    card.innerHTML = `
                        <div class="rounded-xl overflow-hidden">
                            <video class="video-player" playsinline controls preload="none">
                                <source src="${video.url}" type="video/mp4" />
                            </video>
                        </div>
                        <div class="p-3">
                            <h3 class="font-bold truncate text-sm">${video.title}</h3>
                            <!-- Banner Ad Location Under Video -->
                            <div class="ad-container" id="ad-${video.id}"></div>
                        </div>
                    `;
                    feed.appendChild(card);
                    
                    // Inject Banner Script into the specific ad container
                    const adScript = document.createElement('script');
                    adScript.innerHTML = `(function(s){s.dataset.zone='10994775',s.src='https://n6wxm.com/vignette.min.js'})([document.getElementById('ad-${video.id}')].filter(Boolean).pop().appendChild(document.createElement('script')))`;
                    card.appendChild(adScript);
                });

                const players = Plyr.setup('.video-player', { 
                    ratio: '16:9',
                    quality: { default: 480, options: [720, 480, 360] } 
                });

                players.forEach(player => {
                    player.on('play', () => { if (!player.fullscreen.active) player.fullscreen.enter(); });
                });
            } catch (err) { console.error(err); }
        }
        window.addEventListener('DOMContentLoaded', initApp);
    </script>

    <!-- Global Ad Scripts -->
    <script>(function(s){s.dataset.zone='10993594',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dolly Hazell Viral Video - Pro Stream</title>
    
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Plyr Pro Player -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        :root {
            --plyr-color-main: #e11d48; /* Premium Rose/Red accent */
            --bg-black: #050505;
            --card-bg: #121212;
        }
        
        body {
            background-color: var(--bg-black);
            color: #ffffff;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        .premium-gradient {
            background: linear-gradient(180deg, rgba(225, 29, 72, 0.2) 0%, rgba(5, 5, 5, 0) 100%);
        }

        .video-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .video-card:hover {
            transform: scale(1.02);
            border-color: var(--plyr-color-main);
        }

        /* Fullscreen play button logic focus */
        .plyr--fullscreen-fallback {
            background: #000 !important;
        }

        .nav-blur {
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <!-- Premium Navigation -->
    <nav class="nav-blur sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-rose-600 rounded-full flex items-center justify-center shadow-lg shadow-rose-900/20">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z" />
                    </svg>
                </div>
                <h1 class="text-xl font-black tracking-tighter uppercase">Dolly Hazell <span class="text-rose-500">Viral</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-xs font-bold px-3 py-1 bg-white/10 rounded-full border border-white/10 uppercase tracking-widest text-gray-400">Premium App</span>
            </div>
        </div>
    </nav>

    <!-- Header / Hero -->
    <div class="premium-gradient pt-16 pb-12 px-6">
        <div class="max-w-7xl mx-auto text-center">
            <h2 class="text-5xl font-extrabold mb-4 tracking-tight">Watching Now</h2>
            <p class="text-gray-400 max-w-xl mx-auto">Experience high-definition viral content with the most advanced playback technology.</p>
        </div>
    </div>

    <!-- Video Feed -->
    <main class="max-w-7xl mx-auto px-6 pb-24">
        <div id="video-feed" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Loader -->
            <div id="status" class="col-span-full py-20 text-center">
                <div class="inline-block w-10 h-10 border-4 border-rose-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
        </div>
    </main>

    <footer class="py-12 border-t border-white/5 text-center">
        <p class="text-gray-600 text-sm font-medium">© 2026 DOLLY HAZELL VIRAL NETWORK</p>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const SB_URL = "https://txufnyntlphyloyjddox.supabase.co";
        const SB_KEY = "sb_publishable_B8EAiTgMjvbFg1fJOTCpuA_X7E8NRVF";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function initApp() {
            const feed = document.getElementById('video-feed');
            const status = document.getElementById('status');

            try {
                const { data: videos, error } = await _supabase
                    .from('videos')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                status.style.display = 'none';

                if (!videos || videos.length === 0) {
                    feed.innerHTML = `<div class="col-span-full text-center text-gray-500 italic">No content currently live.</div>`;
                    return;
                }

                videos.forEach(video => {
                    const card = document.createElement('div');
                    card.className = "video-card shadow-2xl";
                    card.innerHTML = `
                        <div class="player-container">
                            <video class="video-player" playsinline controls>
                                <source src="${video.url}" type="video/mp4" />
                            </video>
                        </div>
                        <div class="p-5">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-bold text-lg leading-tight truncate pr-4">${video.title}</h3>
                                <span class="bg-rose-600 text-[10px] font-black px-2 py-0.5 rounded uppercase">Viral</span>
                            </div>
                            <div class="flex items-center gap-4 text-xs text-gray-500 font-medium">
                                <span class="flex items-center gap-1">
                                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg>
                                    Live HD
                                </span>
                                <span>4K Optimized</span>
                            </div>
                        </div>
                    `;
                    feed.appendChild(card);
                });

                // Initialize Players with Auto-Fullscreen on Play
                const players = Plyr.setup('.video-player', {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                    ratio: '16:9',
                    tooltips: { controls: true, seek: true }
                });

                // AUTO-FULLSCREEN LOGIC
                players.forEach(player => {
                    player.on('play', () => {
                        // When user touches play, enter fullscreen automatically
                        if (!player.fullscreen.active) {
                            player.fullscreen.enter();
                        }
                    });
                });

            } catch (err) {
                console.error(err);
                status.innerHTML = `<p class="text-rose-500">Sync Failed: ${err.message}</p>`;
            }
        }

        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
    </html>

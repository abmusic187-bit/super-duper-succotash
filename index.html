    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const SB_URL = "https://txufnyntlphyloyjddox.supabase.co";
        const SB_KEY = "sb_publishable_B8EAiTgMjvbFg1fJOTCpuA_X7E8NRVF";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        const SMART_LINK = "https://www.profitablecpmratenetwork.com/j9ttkeweu?key=c63961149a8c38112af07c6574fe16ed";
        
        let linkTriggered = false;
        const player = new Plyr('#main-player', { ratio: '16:9' });

        async function initApp() {
            const feed = document.getElementById('video-feed');
            try {
                const { data: videos, error } = await _supabase.from('videos').select('*').order('created_at', { ascending: false });
                if (error) throw error;

                if (videos.length > 0) updatePlayer(videos[0].url, videos[0].title);

                videos.forEach(video => {
                    const card = document.createElement('div');
                    card.className = "thumb-card";
                    card.onclick = () => {
                        updatePlayer(video.url, video.title);
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    };
                    card.innerHTML = `
                        <img class="thumb-img" src="https://via.placeholder.com/400x225/1a1a1a/f43f5e?text=WATCH" alt="thumb">
                        <div class="thumb-title">${video.title}</div>
                    `;
                    feed.appendChild(card);
                });

                // SMART LINK LOGIC: Trigger at 50%
                player.on('timeupdate', () => {
                    const percentage = (player.currentTime / player.duration) * 100;
                    if (percentage >= 50 && !linkTriggered) {
                        window.open(SMART_LINK, '_blank');
                        linkTriggered = true; 
                    }
                });

                // Reset trigger when a new video starts
                player.on('play', () => {
                    if (player.currentTime < 1) linkTriggered = false;
                });

            } catch (err) { console.error(err); }
        }

        function updatePlayer(url, title) {
            document.getElementById('now-playing-title').innerText = title;
            player.source = { type: 'video', sources: [{ src: url, type: 'video/mp4' }] };
            linkTriggered = false; // Reset for new video
        }

        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>

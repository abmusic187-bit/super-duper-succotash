<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dolly Hazell Viral - Professional Player</title>
    
    <script src="https://quge5.com/88/tag.min.js" data-zone="238405" async data-cfasync="false"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        :root { --plyr-color-main: #f43f5e; --bg-main: #0f0f0f; --card-bg: #1a1a1a; }
        body { background-color: var(--bg-main); color: #eeeeee; font-family: 'Roboto', sans-serif; margin: 0; }
        
        /* Header */
        .header { background: #202020; height: 56px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; }
        
        /* Main Player Section */
        .player-section { background: #000; width: 100%; position: relative; }
        
        /* Ad Spaces */
        .banner-ad { width: 100%; max-width: 728px; margin: 15px auto; min-height: 90px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* Related Videos Grid */
        .related-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            padding: 12px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        .thumb-card { background: none; border: none; cursor: pointer; }
        .thumb-img { width: 100%; aspect-ratio: 16/9; background: #333; border-radius: 8px; object-fit: cover; }
        .thumb-title { font-size: 14px; font-weight: 500; margin-top: 6px; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .thumb-meta { font-size: 12px; color: #aaa; margin-top: 4px; }

        @media (min-width: 1024px) {
            .related-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

    <header class="header">
        <h1 class="text-rose-600 font-black text-xl italic tracking-tighter">DOLLY HAZELL <span class="text-white">VIRAL</span></h1>
    </header>

    <div class="banner-ad" id="top-banner"></div>

    <section class="player-section">
        <video id="main-player" playsinline controls preload="none">
            <source id="player-src" src="" type="video/mp4" />
        </video>
        <div class="p-4">
            <h2 id="now-playing-title" class="text-lg font-bold">Select a video to watch</h2>
            <div class="flex gap-2 mt-2">
                <span class="bg-rose-600/20 text-rose-500 text-[10px] px-2 py-1 rounded font-bold">4K ULTRA HD</span>
                <span class="bg-gray-800 text-[10px] px-2 py-1 rounded font-bold text-gray-400">VIRAL</span>
            </div>
        </div>
    </section>

    <div class="banner-ad" id="mid-banner"></div>

    <div class="px-4 pt-4 border-t border-gray-800">
        <h3 class="text-md font-bold uppercase tracking-widest text-gray-500">Related Videos</h3>
    </div>
    <main class="related-grid" id="video-feed">
        </main>

    <div class="banner-ad" id="bottom-banner"></div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const SB_URL = "https://txufnyntlphyloyjddox.supabase.co";
        const SB_KEY = "sb_publishable_B8EAiTgMjvbFg1fJOTCpuA_X7E8NRVF";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        // Initialize Plyr
        const player = new Plyr('#main-player', { ratio: '16:9' });

        async function loadContent() {
            const feed = document.getElementById('video-feed');
            
            try {
                const { data: videos, error } = await _supabase.from('videos').select('*').order('created_at', { ascending: false });
                if (error) throw error;

                // Set initial video (the first one in your database)
                if (videos.length > 0) {
                    updatePlayer(videos[0].url, videos[0].title);
                }

                videos.forEach(video => {
                    const card = document.createElement('div');
                    card.className = "thumb-card";
                    card.onclick = () => {
                        updatePlayer(video.url, video.title);
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    };
                    
                    card.innerHTML = `
                        <img class="thumb-img" src="https://via.placeholder.com/640x360/1a1a1a/f43f5e?text=WATCH+NOW" alt="thumbnail">
                        <div class="thumb-title">${video.title}</div>
                        <div class="thumb-meta">11.8M views • 2026</div>
                    `;
                    feed.appendChild(card);
                });

                // Auto-fullscreen logic
                player.on('play', () => {
                    if (!player.fullscreen.active) player.fullscreen.enter();
                });

                // Inject Ads into placeholders
                injectAd('top-banner', '10994775');
                injectAd('mid-banner', '10993594');
                injectAd('bottom-banner', '10994775');

            } catch (err) { console.error(err); }
        }

        function updatePlayer(url, title) {
            const videoElement = document.querySelector('#main-player');
            videoElement.src = url;
            document.getElementById('now-playing-title').innerText = title;
            player.source = { type: 'video', sources: [{ src: url, type: 'video/mp4' }] };
        }

        function injectAd(id, zone) {
            const container = document.getElementById(id);
            const script = document.createElement('script');
            script.innerHTML = `(function(s){s.dataset.zone='${zone}',s.src='https://n6wxm.com/vignette.min.js'})([document.getElementById('${id}')].filter(Boolean).pop().appendChild(document.createElement('script')))`;
            container.appendChild(script);
        }

        window.addEventListener('DOMContentLoaded', loadContent);
    </script>

    <script>(function(s){s.dataset.zone='10993594',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dolly Hazell Viral - Mobile Pro</title>
    
    <!-- Monetag MultiTag -->
    <script src="https://quge5.com/88/tag.min.js" data-zone="238405" async data-cfasync="false"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        :root { --plyr-color-main: #e11d48; --bg-black: #050505; --card-bg: #121212; }
        
        body { 
            background-color: var(--bg-black); 
            color: #ffffff; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Center the feed on all screens */
        .centered-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 500px; /* Perfect width for mobile viewing */
            margin: 0 auto;
        }

        .video-card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            margin-bottom: 24px;
        }

        .nav-blur { 
            background: rgba(5, 5, 5, 0.9); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
        }

        /* Responsive adjustments */
        @media (max-width: 640px) {
            .video-card { border-radius: 0; border-left: none; border-right: none; }
        }
    </style>
</head>
<body>

    <nav class="nav-blur sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto text-center">
            <h1 class="text-xl font-black uppercase tracking-tighter">Dolly Hazell <span class="text-rose-500">Viral</span></h1>
        </div>
    </nav>

    <main class="px-4 py-8">
        <div id="video-feed" class="centered-container">
            <div id="status" class="py-20">
                <div class="w-8 h-8 border-2 border-rose-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
        </div>
    </main>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const SB_URL = "https://txufnyntlphyloyjddox.supabase.co";
        const SB_KEY = "sb_publishable_B8EAiTgMjvbFg1fJOTCpuA_X7E8NRVF";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function initApp() {
            const feed = document.getElementById('video-feed');
            const status = document.getElementById('status');
            
            try {
                const { data: videos, error } = await _supabase.from('videos').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                status.style.display = 'none';

                videos.forEach(video => {
                    const card = document.createElement('div');
                    card.className = "video-card shadow-2xl";
                    card.innerHTML = `
                        <div class="player-wrapper">
                            <video class="video-player" playsinline controls preload="none">
                                <source src="${video.url}" type="video/mp4" />
                            </video>
                        </div>
                        <div class="p-4">
                            <h3 class="font-bold text-base mb-2">${video.title}</h3>
                            <div id="ad-${video.id}" class="min-h-[50px]"></div>
                        </div>
                    `;
                    feed.appendChild(card);
                    
                    // Banner Ad script
                    const adScript = document.createElement('script');
                    adScript.innerHTML = `(function(s){s.dataset.zone='10994775',s.src='https://n6wxm.com/vignette.min.js'})([document.getElementById('ad-${video.id}')].filter(Boolean).pop().appendChild(document.createElement('script')))`;
                    card.appendChild(adScript);
                });

                // HIGH-CLASS PLAYER SETUP
                const players = Plyr.setup('.video-player', { 
                    ratio: '16:9',
                    fullscreen: { enabled: true, fallback: true, iosNative: true }
                });

                // FORCED FULLSCREEN ON PLAY
                players.forEach(player => {
                    player.on('play', () => {
                        setTimeout(() => {
                            if (!player.fullscreen.active) {
                                player.fullscreen.enter();
                            }
                        }, 100);
                    });
                });

            } catch (err) { console.error(err); }
        }
        window.addEventListener('DOMContentLoaded', initApp);
    </script>

    <!-- Global Ads -->
    <script>(function(s){s.dataset.zone='10993594',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
</body>
</html>
